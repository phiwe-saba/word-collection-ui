<div class="container">
    <div class="main-card mb-3 card">
        <!--Filter-->
        <div class="row mb-3 mt-4">
            <div class="col-md-3">
                <label class="form-label small text-muted">Word</label>
                <input type="text" class="form-control" placeholder="Enter a word">
            </div>
            <div class="col-md-3">
                <label class="form-label small text-muted">Speech Type</label>
                <input type="text" class="form-control" placeholder="Enter a speech type">
            </div>
            <div class="col-md-2 d-flex align-items-end">
                <!--<button class="btn btn-primary" (click)="searchItems()">Search</button>-->
            </div>
        </div>

        <!--Loading-->
        <div *ngIf="isLoading" class="text-center py-12">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden"></span>
            </div>
            <p class="mt-2 text-muted">Loading queue items...</p>
        </div>

        <!--Table-->
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                    <tr>
                        <th scope="col">Word</th>
                        <th scope="col">Speech Type</th>
                        <th scope="col">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr *ngFor="let word of data">
                        <td>{{ word.word }}</td>
                        <td>{{ word.wordType }}</td>
                        <td>
                            
                            <button class="btn btn-sm btn-danger" (click)="deleteWord(word.id)">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<router-outlet />
