name: Frontend CI

on:
  push:
    branches: 
      - master
      - feature/collection-changes


  pull_request:
    branches: 
      - master
      - feature/collection-changes

jobs:

  build:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.20.0

      - name: Install Dependencies
        run: npm ci

      - name: Build Angular
        run: npm run build
